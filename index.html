<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aiy Here - Universal AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .dark-mode { background-color: #131314; color: #e3e3e3; }
        #loading { position: fixed; inset: 0; background: white; display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 1rem; }
        .hidden { display: none !important; }
        .prose pre { background: #1e293b; color: white; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 transition-colors duration-200">

    <div id="loading">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
        <p class="font-medium text-gray-600">Initializing Aiy Here...</p>
    </div>

    <div id="app" class="hidden flex flex-col h-screen overflow-hidden">
        <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden"></div>
        <div class="flex flex-1 overflow-hidden relative">
            <aside id="sidebar" class="absolute md:relative z-40 w-72 h-full bg-gray-100 dark:bg-[#1e1e1f] border-r dark:border-gray-700 transition-transform duration-300 -translate-x-full md:translate-x-0 flex flex-col p-4">
                <button onclick="createNewChat()" class="flex items-center gap-3 w-full p-3 bg-white dark:bg-gray-800 border rounded-full hover:shadow-sm transition mb-6">
                    <i data-lucide="plus"></i> New Chat
                </button>
                <div id="chat-list" class="flex-1 overflow-y-auto space-y-1"></div>
                <div class="pt-4 border-t dark:border-gray-700 space-y-2">
                    <button onclick="toggleDarkMode()" class="flex items-center gap-3 w-full p-3 hover:bg-gray-200 dark:hover:bg-gray-800 rounded-xl">
                        <i data-lucide="moon"></i> Toggle Dark Mode
                    </button>
                    <button onclick="openSettings()" class="flex items-center gap-3 w-full p-3 hover:bg-gray-200 dark:hover:bg-gray-800 rounded-xl">
                        <i data-lucide="settings"></i> Settings
                    </button>
                </div>
            </aside>

            <main class="flex-1 flex flex-col relative bg-white dark:bg-[#131314]">
                <header class="md:hidden flex items-center justify-between p-4 border-b dark:border-gray-700">
                    <button onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
                    <h1 class="font-semibold">Aiy Here</h1>
                    <button onclick="openSettings()"><i data-lucide="settings"></i></button>
                </header>

                <div id="chat-messages" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 pb-32">
                    <div id="welcome-screen" class="h-full flex flex-col items-center justify-center text-center max-w-2xl mx-auto py-20">
                        <h2 class="text-4xl font-semibold text-blue-600 mb-4">Hello, BADZ</h2>
                        <p class="text-gray-500">How can I help you today?</p>
                    </div>
                </div>

                <div class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-white dark:from-[#131314]">
                    <div class="max-w-3xl mx-auto flex items-end gap-2 p-3 bg-gray-100 dark:bg-[#1e1e1f] rounded-2xl border-2 border-transparent focus-within:border-blue-500">
                        <textarea id="user-input" rows="1" placeholder="Type a message..." class="w-full bg-transparent border-none focus:ring-0 resize-none py-2 px-2"></textarea>
                        <button onclick="sendMessage()" class="p-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700">
                            <i data-lucide="send-horizontal"></i>
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="settings-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 hidden">
        <div class="bg-white dark:bg-[#1e1e1f] w-full max-w-md rounded-2xl p-6 shadow-2xl">
            <h3 class="text-xl font-bold mb-4">Settings</h3>
            <div class="space-y-4">
                <input type="password" id="api-key" placeholder="OpenRouter API Key" class="w-full p-3 rounded-lg border dark:bg-gray-800 dark:border-gray-700">
                <input type="text" id="model-name" value="deepseek/deepseek-r1:free" class="w-full p-3 rounded-lg border dark:bg-gray-800 dark:border-gray-700">
                <button onclick="saveSettings()" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold">Save</button>
                <button onclick="closeSettings()" class="w-full py-2 text-gray-500">Close</button>
            </div>
        </div>
    </div>

    <script>
        // Data State
        let chats = JSON.parse(localStorage.getItem('aiy_chats') || '[]');
        let currentChatId = null;
        let isDarkMode = localStorage.getItem('aiy_dark_mode') === 'true';
        let config = {
            apiKey: localStorage.getItem('aiy_api_key') || '',
            model: localStorage.getItem('aiy_model') || 'deepseek/deepseek-r1:free'
        };

        // UI Initialization Function
        function initApp() {
            try {
                if (typeof lucide !== 'undefined') lucide.createIcons();
                if (isDarkMode) applyTheme();
                renderChatList();
                
                // Show App
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                console.log("App Initialized Successfully");
            } catch (e) {
                console.error("Initialization Error:", e);
                // Force show app even if icons fail
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
            }
        }

        // Run Init
        window.onload = initApp;
        // Global Timeout Fallback (3 seconds)
        setTimeout(() => {
            if (document.getElementById('app').classList.contains('hidden')) {
                initApp();
            }
        }, 3000);

        // --- Features ---
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text || !config.apiKey) {
                if (!config.apiKey) alert("Settings mein API Key daalein!");
                return;
            }

            if (!currentChatId) createNewChat(text);
            const chat = chats.find(c => c.id === currentChatId);
            chat.messages.push({ role: 'user', content: text });
            input.value = '';
            renderMessages();

            // Prepare AI Response
            chat.messages.push({ role: 'assistant', content: 'Thinking...' });
            renderMessages();

            try {
                const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${config.apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: config.model,
                        messages: chat.messages.slice(0, -1)
                    })
                });
                const data = await res.json();
                chat.messages[chat.messages.length - 1].content = data.choices[0].message.content;
                saveToLocal();
                renderMessages();
            } catch (err) {
                chat.messages[chat.messages.length - 1].content = "API Error. Please check your key.";
                renderMessages();
            }
        }

        function createNewChat(title = 'New Chat') {
            const id = Date.now().toString();
            chats.unshift({ id, title: title.substring(0, 20), messages: [] });
            currentChatId = id;
            saveToLocal();
            renderChatList();
            renderMessages();
        }

        function renderMessages() {
            const container = document.getElementById('chat-messages');
            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;
            document.getElementById('welcome-screen').classList.add('hidden');
            
            container.innerHTML = chat.messages.map(m => `
                <div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}">
                    <div class="max-w-[85%] p-3 rounded-2xl ${m.role === 'user' ? 'bg-blue-600 text-white' : 'bg-gray-100 dark:bg-gray-800 prose dark:prose-invert'}">
                        ${m.role === 'user' ? m.content : marked.parse(m.content)}
                    </div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        function renderChatList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = chats.map(c => `
                <div onclick="selectChat('${c.id}')" class="p-3 rounded-lg cursor-pointer hover:bg-gray-200 dark:hover:bg-gray-800 ${currentChatId === c.id ? 'bg-gray-200 dark:bg-gray-800' : ''}">
                    ${c.title}
                </div>
            `).join('');
        }

        function selectChat(id) { currentChatId = id; renderMessages(); renderChatList(); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); document.getElementById('overlay').classList.toggle('hidden'); }
        function toggleDarkMode() { isDarkMode = !isDarkMode; localStorage.setItem('aiy_dark_mode', isDarkMode); applyTheme(); }
        function applyTheme() { document.documentElement.classList.toggle('dark', isDarkMode); }
        function openSettings() { document.getElementById('settings-modal').classList.remove('hidden'); }
        function closeSettings() { document.getElementById('settings-modal').classList.add('hidden'); }
        function saveSettings() {
            config.apiKey = document.getElementById('api-key').value;
            config.model = document.getElementById('model-name').value;
            localStorage.setItem('aiy_api_key', config.apiKey);
            localStorage.setItem('aiy_model', config.model);
            closeSettings();
        }
        function saveToLocal() { localStorage.setItem('aiy_chats', JSON.stringify(chats)); }
    </script>
</body>
</html>
